apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: active-cluster-service
  labels:
    app: active-cluster-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: active-cluster-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
