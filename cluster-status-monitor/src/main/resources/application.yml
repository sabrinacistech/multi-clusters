server:
  port: 8081

spring:
  application:
    name: cluster-status-monitor
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGO_URI_SHARED:mongodb://localhost:27017/paas_shared}
      auto-index-creation: true

# Datasource dedicado para el cache (colección TTL). Se puede apuntar a otra base/cluster.
csm-cache:
  mongodb:
    uri: ${MONGO_URI_CACHE:mongodb://localhost:27017/paas_cache}

csm:
  scheduler:
    enabled: ${CSM_SCHEDULER_ENABLED:true}
    fixed-delay: ${CSM_SCHEDULER_FIXED_DELAY:30000}
    cron: ${CSM_SCHEDULER_CRON:-}
    initial-delay: ${CSM_SCHEDULER_INITIAL_DELAY:10000}
  probe:
    timeout-ms: ${CSM_PROBE_TIMEOUT_MS:3000}
    max-retries: ${CSM_PROBE_MAX_RETRIES:2}
    retry-backoff-ms: ${CSM_PROBE_RETRY_BACKOFF_MS:500}
  manual-grace-seconds: ${CSM_MANUAL_GRACE_SECONDS:300}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS:30}
  clusters:
    - app: app-a
      cluster: ocp-cluster-01
      health-url: https://ocp-cluster-01.example.com/healthz
    - app: app-a
      cluster: ocp-cluster-02
      health-url: https://ocp-cluster-02.example.com/healthz
    - app: app-b
      cluster: ocp-cluster-01
      health-url: https://ocp-cluster-01.example.com/healthz

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
