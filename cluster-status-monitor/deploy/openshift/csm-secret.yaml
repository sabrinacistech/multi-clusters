apiVersion: v1
kind: Secret
metadata:
  name: cluster-status-monitor-secret
  labels:
    app: cluster-status-monitor
type: Opaque
stringData:
  # Reemplazar por las URIs reales (usuario csm_writer con readWrite).
  MONGO_URI_SHARED: "mongodb://csm_writer:CHANGEME@mongo-shared:27017/paas_shared?authSource=paas_shared&w=majority"
  MONGO_URI_CACHE: "mongodb://csm_writer:CHANGEME@mongo-cache:27017/paas_cache?authSource=paas_cache&w=majority"
