openapi: 3.0.3
info:
  title: Cluster Status Service API
  description: >-
    Microservicio que expone el estado del clúster almacenado en MongoDB.
    Las clases de respuesta (meta, data y errors) se definen en este contrato
    OpenAPI y se generan a Java mediante openapi-generator-maven-plugin.
  version: 1.0.0

paths:
  /get-cluster-status:
    get:
      tags:
        - cluster-status
      summary: cluster status result
      operationId: getClusterStatus
      responses:
        '200':
          description: Estado actual del clúster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseApiClusterStatus'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseApiClusterStatus'
              examples:
                ExampleResponseApiError:
                  $ref: '#/components/examples/ExampleResponseApiError'

components:
  schemas:
    ErrorData:
      type: object
      required:
        - code
        - detail
      properties:
        code:
          type: string
          description: Error Code
        detail:
          type: string
          description: Error Detail
      example:
        code: "500"
        detail: "Internal Several Errors"

    MetaData:
      type: object
      description: Estructura Meta
      properties:
        method:
          type: string
        operation:
          type: string
      example:
        method: GET
        operation: "/v1/pass/arqs/cluster-availability-service/get-cluster-status"

    ClusterStatusIsActiveDTO:
      type: object
      title: Cluster Status Is Active
      description: Cluster Status Is Active
      properties:
        active:
          type: boolean
          description: cluster es activo
        pollingIntervalSeconds:
          type: integer
          description: intervalo de consulta

    ResponseApiClusterStatus:
      type: object
      title: Root Type for ResponseApiClusterStatus
      description: The root of the ResponseApiClusterStatus type's schema.
      properties:
        meta:
          $ref: '#/components/schemas/MetaData'
        data:
          $ref: '#/components/schemas/ClusterStatusIsActiveDTO'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorData'

  examples:
    ExampleResponseApiError:
      value:
        meta:
          method: 'GET'
          operation: '/v1/pass/arqs/cluster-availability-service/get-cluster-status'
        data: null
        errors:
          - code: 'com.sabrinacistech.multiclusters.exception.ResourceNotFoundException'
            detail: 'Cluster Status not found'
